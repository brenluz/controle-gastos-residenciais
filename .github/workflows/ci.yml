name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restaura dependências
        run: dotnet restore backend/ControleGastos.sln
      - name: Testa
        run: dotnet test backend/ControleGastos.sln --no-restore

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instala dependências
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Testes
        run: npm test
      - name: Build
        run: npm run build
